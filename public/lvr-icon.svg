<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LVR app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6eaef"/>
    </linearGradient>
    <radialGradient id="ballShade" cx="38%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="65%" stop-color="#f6f8fa"/>
      <stop offset="100%" stop-color="#ced4dc"/>
    </radialGradient>
    <linearGradient id="pillGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2842"/>
      <stop offset="100%" stop-color="#0a1428"/>
    </linearGradient>
    <clipPath id="ballClip">
      <circle cx="0" cy="0" r="137"/>
    </clipPath>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>

  <!-- Soft contact shadow under the ball -->
  <ellipse cx="256" cy="378" rx="118" ry="12" fill="#0a1428" opacity="0.12"/>

  <!-- Soccer ball -->
  <g transform="translate(256 220)">
    <circle r="140" fill="url(#ballShade)" stroke="#0a1428" stroke-width="5"/>

    <g clip-path="url(#ballClip)" fill="#0a1428">
      <!-- Central pentagon (larger) -->
      <polygon points="0,-55 52.32,-17.00 32.33,44.49 -32.33,44.49 -52.32,-17.00"/>

      <!-- 5 outer pentagons (larger), positioned at the ball edge, clipped by the circle -->
      <polygon points="0,-80 52.32,-118.00 32.33,-179.49 -32.33,-179.49 -52.32,-118.00"/>
      <g transform="rotate(72)"><polygon points="0,-80 52.32,-118.00 32.33,-179.49 -32.33,-179.49 -52.32,-118.00"/></g>
      <g transform="rotate(144)"><polygon points="0,-80 52.32,-118.00 32.33,-179.49 -32.33,-179.49 -52.32,-118.00"/></g>
      <g transform="rotate(216)"><polygon points="0,-80 52.32,-118.00 32.33,-179.49 -32.33,-179.49 -52.32,-118.00"/></g>
      <g transform="rotate(288)"><polygon points="0,-80 52.32,-118.00 32.33,-179.49 -32.33,-179.49 -52.32,-118.00"/></g>

      <!-- Seams from central pentagon vertices to outer pentagon inner vertices -->
      <g stroke="#0a1428" stroke-width="6" fill="none" stroke-linecap="round">
        <line x1="0"      y1="-55"    x2="0"      y2="-80"/>
        <line x1="52.32"  y1="-17.00" x2="76.08"  y2="-24.72"/>
        <line x1="32.33"  y1="44.49"  x2="47.05"  y2="64.72"/>
        <line x1="-32.33" y1="44.49"  x2="-47.05" y2="64.72"/>
        <line x1="-52.32" y1="-17.00" x2="-76.08" y2="-24.72"/>
      </g>
    </g>
  </g>

  <!-- LVR pill badge -->
  <g transform="translate(256 410)">
    <rect x="-78" y="-30" width="156" height="60" rx="30" fill="url(#pillGrad)"/>
    <text x="0" y="11"
          font-family="Inter, Helvetica, Arial, sans-serif"
          font-size="34" font-weight="900"
          fill="#ffffff" text-anchor="middle" letter-spacing="4">LVR</text>
  </g>
</svg>
