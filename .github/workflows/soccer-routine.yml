name: Soccer Stats Fixtures and Results

on:
  schedule:
    # Every 3 hours. In Adelaide this gives regular fixture refreshes and
    # result settlement across the day without hammering the upstream APIs.
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: soccer-routine
  cancel-in-progress: false

jobs:
  run:
    # Self-hosted runner on the user's PC. SofaScore blocks GitHub-hosted (Azure
    # datacenter) IPs at the Cloudflare layer, so we use the home IP instead.
    runs-on: [self-hosted, Windows]
    timeout-minutes: 60
    defaults:
      run:
        # PowerShell 5.1 with execution policy bypass so the runner's temp .ps1 files run.
        shell: 'powershell -NoLogo -NoProfile -ExecutionPolicy Bypass -File "{0}"'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Python
        run: |
          python --version
          python -c "import sys; assert sys.version_info >= (3, 9), 'need Python 3.9+'"

      - name: Install dependencies
        run: python -m pip install --quiet --upgrade pip curl_cffi tzdata

      - name: Snapshot match_data.json before run
        id: pre
        run: |
          if (Test-Path match_data.json) {
            $h = (Get-FileHash match_data.json -Algorithm SHA256).Hash.ToLower()
            $s = (Get-Item match_data.json).Length
            Add-Content -Path $env:GITHUB_OUTPUT -Value "hash=$h"
            Add-Content -Path $env:GITHUB_OUTPUT -Value "size=$s"
          }

      - name: Run the master soccer routine
        run: |
          Write-Host "Collecting fixture slate"
          python scripts/soccer_phase1_fixtures.py
          Write-Host "Settling results and refreshing forecasts"
          python scripts/soccer_routine.py

      - name: Verify routine actually changed data
        run: |
          $postHash = (Get-FileHash match_data.json -Algorithm SHA256).Hash.ToLower()
          $postSize = (Get-Item match_data.json).Length
          $preHash  = "${{ steps.pre.outputs.hash }}"
          $preSize  = "${{ steps.pre.outputs.size }}"
          Write-Host "pre  size=$preSize  hash=$preHash"
          Write-Host "post size=$postSize hash=$postHash"
          if ($preHash -and ($preHash -eq $postHash)) {
            $finishedToday = python -c "import json,datetime; d=json.load(open('match_data.json')); t=datetime.date.today().isoformat(); print(sum(1 for lg in d['leagues'] for m in lg['matches'] if m.get('settled_at')==t))"
            if ($finishedToday.Trim() -eq "0") {
              Write-Host "::warning::match_data.json unchanged AND zero settlements today — possible silent fetch failure"
            } else {
              Write-Host "match_data.json unchanged but $finishedToday settlements recorded today — OK"
            }
          }

      - name: Commit and push changes
        run: |
          git config user.name  "soccer-stats-bot"
          git config user.email "actions@github.com"
          git add match_data.json team_elo.json scripts/ docs/
          Get-ChildItem -Path . -Filter "predictions_*.json" | ForEach-Object { git add $_.FullName }
          Get-ChildItem -Path . -Filter "predictions_*.md" | ForEach-Object { git add $_.FullName }
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "No changes to commit"
            exit 0
          }
          $stamp = Get-Date -Format 'yyyy-MM-ddTHH:mm'
          git commit -m "Auto-run ${stamp}: settle results + new forecasts + odds refresh"
          # Pull-rebase first in case auto_push.bat (Windows Task Scheduler) committed in parallel
          git pull --rebase --strategy-option=ours origin main
          if ($LASTEXITCODE -ne 0) {
            git rebase --abort
            Write-Host "::error::pull-rebase failed"
            exit 1
          }
          git push origin main
