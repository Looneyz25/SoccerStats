name: Daily Predictions
on:
  schedule:
    # Every 3 hours - 8 runs/day for tightest coverage
    # In Adelaide ACST (UTC+9:30): 09:30, 12:30, 15:30, 18:30, 21:30, 00:30, 03:30, 06:30
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-predictions
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet curl_cffi

      - name: Run daily routine
        run: python scripts/run_routine.py

      - name: Commit & push changes
        run: |
          git config user.name "soccer-stats-bot"
          git config user.email "actions@github.com"
          git add index.html match_data.json match_data_afl.json predictions_*.json predictions_*.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%dT%H:%M)
          git commit -m "Auto-run ${DATE}: settle results + new forecasts + odds refresh"
          git push origin main
