name: Retire GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/retire-github-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-retired
  cancel-in-progress: true

jobs:
  retire:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://lvrstats.com
    steps:
      - name: Build retired page
        run: |
          mkdir -p retired
          cat > retired/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <meta name="robots" content="noindex,nofollow">
              <meta http-equiv="refresh" content="0; url=https://lvrstats.com/dashboard">
              <title>LVR Stats has moved</title>
              <style>
                body {
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  font-family: Arial, sans-serif;
                  color: #0f172a;
                  background: #f8fafc;
                }
                main {
                  max-width: 36rem;
                  padding: 2rem;
                  text-align: center;
                }
                a {
                  color: #047857;
                  font-weight: 700;
                }
              </style>
            </head>
            <body>
              <main>
                <h1>LVR Stats has moved</h1>
                <p>The GitHub Pages preview is retired. Use the live app at <a href="https://lvrstats.com/dashboard">lvrstats.com</a>.</p>
              </main>
            </body>
          </html>
          HTML
          cp retired/index.html retired/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: retired
      - uses: actions/deploy-pages@v4
