name: Deploy Firebase Hosting

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'public/**'
      - 'scripts/**'
      - 'match_data.json'
      - 'predictions_*.json'
      - 'firebase.json'
      - '.firebaserc'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.js'
      - 'tailwind.config.js'
      - 'postcss.config.js'

permissions:
  contents: read

concurrency:
  group: firebase-hosting
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Authenticate to Google Cloud
        id: firebase-auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPORTS_PREDICTIONS_F91FD }}'

      - name: Upload dashboard data to Firestore
        run: npm run data:firebase

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPORTS_PREDICTIONS_F91FD }}'
          projectId: sports-predictions-f91fd
          channelId: live

      - name: Deploy Firestore rules
        run: npx firebase-tools deploy --only firestore:rules --project sports-predictions-f91fd
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.firebase-auth.outputs.credentials_file_path }}
