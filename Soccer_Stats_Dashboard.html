<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Looneyz Predictions</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --sofa-bg:#14181f; --sofa-bg-2:#1a1f2e; --sofa-panel:#242938;
    --sofa-line:#3a4055; --sofa-accent:#2eb360;
    --sofa-text:#fff; --sofa-muted:#9aa3b2;
    --sofa-hit:#2eb360; --sofa-miss:#e5444b; --sofa-pend:#f2a93b; --sofa-blue:#3478f6;
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--sofa-bg);color:var(--sofa-text);font-family:"Inter","Helvetica Neue",Arial,sans-serif;font-size:14px}
  header.topbar{height:56px;background:linear-gradient(180deg,#11161e 0%,#1a1f2e 100%);display:flex;align-items:center;padding:0 20px;border-bottom:1px solid var(--sofa-line);position:sticky;top:0;z-index:10}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px}
  .brand .dot{width:10px;height:10px;background:var(--sofa-accent);border-radius:50%}
  .brand .sub{color:var(--sofa-muted);font-weight:400;font-size:12px;margin-left:6px}
  .meta{margin-left:auto;color:var(--sofa-muted);font-size:12px}
  .layout{display:grid;grid-template-columns:360px 1fr;gap:16px;padding:16px;min-height:calc(100vh - 56px)}
  @media(max-width:880px){.layout{grid-template-columns:1fr}}
  aside.left{background:var(--sofa-bg-2);border:1px solid var(--sofa-line);border-radius:12px;padding:14px;height:calc(100vh - 88px);display:flex;flex-direction:column;gap:12px}
  .filters{display:flex;gap:8px}
  .date-nav-btn{background:var(--sofa-panel);color:var(--sofa-text);border:1px solid var(--sofa-line);border-radius:8px;padding:8px 10px;font-size:14px;font-weight:700;cursor:pointer;min-width:34px}  .date-nav-btn:hover{background:var(--sofa-panel-2);border-color:var(--sofa-accent)}
  .filters select{flex:1;background:var(--sofa-panel);color:var(--sofa-text);border:1px solid var(--sofa-line);border-radius:8px;padding:9px 12px;font-size:13px;cursor:pointer}
  .matches-list{flex:1;overflow-y:auto;margin:0 -4px;padding:0 4px}
  .matches-list::-webkit-scrollbar{width:6px}
  .matches-list::-webkit-scrollbar-thumb{background:var(--sofa-line);border-radius:3px}
  .day-header{color:var(--sofa-muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;padding:12px 6px 6px;border-bottom:1px solid var(--sofa-line);margin-bottom:6px}
  .match-row{display:grid;grid-template-columns:90px 1fr 14px;gap:10px;align-items:center;padding:10px 8px;border-radius:8px;cursor:pointer;border:1px solid transparent}
  .match-row:hover{background:var(--sofa-panel)}
  .match-row.active{background:var(--sofa-panel);border-color:var(--sofa-accent)}
  .match-row .ko{color:var(--sofa-muted);font-size:12px;font-weight:700;text-align:right;line-height:1.25}
  .lg-tag{font-size:9px;color:var(--sofa-muted);margin-top:3px;text-transform:uppercase;letter-spacing:.4px;font-weight:700;text-align:right;white-space:normal;line-height:1.15;max-width:90px}

  .match-row .teams{font-size:13px;line-height:1.4;min-width:0}
  .match-row .teams .t{display:flex;justify-content:space-between;gap:8px;align-items:center}
  .match-row .teams .t .name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .match-row .teams .t .score{font-weight:700;font-size:13px;min-width:18px;text-align:right}
  .match-row .teams .t .score.dim{color:var(--sofa-muted);font-weight:400}
  .match-row .indicator{width:10px;height:10px;border-radius:50%;background:var(--sofa-pend)}
  .match-row .indicator.hit{background:var(--sofa-hit)}
  .match-row .indicator.miss{background:var(--sofa-miss)}
  .match-row .indicator.upcoming{background:var(--sofa-blue)}
  main.right{background:var(--sofa-bg-2);border:1px solid var(--sofa-line);border-radius:12px;overflow:hidden;height:calc(100vh - 88px);overflow-y:auto}
  main.right::-webkit-scrollbar{width:8px}
  main.right::-webkit-scrollbar-thumb{background:var(--sofa-line);border-radius:4px}
  .card-empty{padding:80px 20px;text-align:center;color:var(--sofa-muted)}
  .card-hero{padding:24px 20px;background:linear-gradient(180deg,#1c2233 0%,#1a1f2e 100%);border-bottom:1px solid var(--sofa-line)}
  .card-hero .crumbs{color:var(--sofa-muted);font-size:12px;margin-bottom:8px}
  .card-hero .row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px}
  .team-block{text-align:center;padding:8px;border-radius:12px;transition:all .2s}
  .team-block.winner{background:rgba(46,179,96,.15)}
  .team-block.winner .badge{border-color:var(--sofa-accent);box-shadow:0 0 0 3px rgba(46,179,96,.25)}
  .team-block.winner .name{color:var(--sofa-accent)}
  .team-block.loser{opacity:.55}
  .team-block.draw{background:rgba(242,169,59,.10)}
  .team-block .badge{width:60px;height:60px;margin:0 auto 8px;background:var(--sofa-panel);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--sofa-accent);border:2px solid var(--sofa-line)}
  .team-block .name{font-size:16px;font-weight:700}
  .team-block .meta{color:var(--sofa-muted);font-size:11px;margin-top:2px}
  .score-block{text-align:center;min-width:170px}
  .score-block .ko{color:var(--sofa-muted);font-size:11px;text-transform:uppercase;letter-spacing:.8px}
  .score-block .scoreline{font-size:38px;font-weight:800;letter-spacing:1px;margin:4px 0}
  .score-block .scoreline.upcoming{color:var(--sofa-muted);font-size:22px;font-weight:700}
  .score-block .status{display:inline-block;padding:3px 10px;border-radius:999px;font-size:10px;text-transform:uppercase;font-weight:700}
  .status.ft{background:rgba(46,179,96,.18);color:var(--sofa-accent)}
  .status.upcoming{background:rgba(52,120,246,.18);color:var(--sofa-blue)}
  .pred-line{margin-top:14px;font-size:12px;color:var(--sofa-muted)}
  .pred-line .lbl{text-transform:uppercase;letter-spacing:.5px;font-size:10px;display:block;margin-bottom:4px}
  .pred-line .pick{color:var(--sofa-blue);font-weight:700;font-size:14px}
  .pred-line .pick.hit{color:var(--sofa-hit)}
  .pred-line .pick.miss{color:var(--sofa-miss);text-decoration:line-through;text-decoration-color:rgba(229,68,75,.6)}
  .actual-line{margin-top:8px;font-size:13px;font-weight:700}
  .actual-line .lbl{text-transform:uppercase;letter-spacing:.5px;font-size:10px;color:var(--sofa-muted);display:block;margin-bottom:4px}
  .actual-line .actual{padding:5px 12px;border-radius:6px;background:rgba(46,179,96,.22);color:var(--sofa-hit);font-size:14px;display:inline-block}
  .actual-line .actual.draw{background:rgba(242,169,59,.22);color:var(--sofa-pend)}
  .section{padding:18px 20px;border-bottom:1px solid var(--sofa-line)}
  .section:last-child{border-bottom:none}
  .section h3{margin:0 0 12px;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--sofa-muted);font-weight:700;display:flex;align-items:center;gap:8px}
  .section h3::before{content:"";width:3px;height:12px;background:var(--sofa-accent);border-radius:2px}
  .odds-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .odd-card{background:var(--sofa-panel);border-radius:8px;padding:10px 14px;text-align:center;border:1px solid var(--sofa-line)}
  .odd-card .lbl{color:var(--sofa-muted);font-size:11px;text-transform:uppercase}
  .odd-card .val{font-size:20px;font-weight:800;margin-top:4px}
  /* RULE: no "favourite" outline highlights anywhere — odds boxes show value only, not which is shortest. */

  .preds{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .pred{background:var(--sofa-panel);border-radius:8px;padding:10px 14px;border-left:3px solid var(--sofa-line);display:flex;justify-content:space-between;align-items:center;gap:8px}
  .pred .lbl{color:var(--sofa-muted);font-size:11px;text-transform:uppercase}
  .pred .pick{font-weight:700;font-size:14px}
  .pred .res{font-size:12px;padding:2px 8px;border-radius:999px;font-weight:700}
  .pred-odds{display:inline-block;margin-left:6px;color:var(--sofa-pend);font-weight:700;font-size:12px;padding:1px 6px;border-radius:4px;background:rgba(242,169,59,.12);font-variant-numeric:tabular-nums}

  .pred .res.hit{background:rgba(46,179,96,.18);color:var(--sofa-hit)}
  .pred .res.miss{background:rgba(229,68,75,.18);color:var(--sofa-miss)}
  .pred .res.pending{background:rgba(242,169,59,.18);color:var(--sofa-pend)}
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-cell{background:var(--sofa-panel);border-radius:8px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
  .stat-cell .lbl{color:var(--sofa-muted);font-size:11px;text-transform:uppercase}
  .stat-cell .val{font-weight:700;font-size:14px}
  .stat-cell .split{font-size:12px;color:var(--sofa-muted)}
  .streak-tables{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:1100px){.streak-tables{grid-template-columns:1fr}}
  .streak-table{background:var(--sofa-panel);border:1px solid var(--sofa-line);border-radius:8px;overflow:hidden}
  .streak-table .st-head{padding:10px 14px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--sofa-text);border-bottom:1px solid var(--sofa-line);background:rgba(255,255,255,.03);text-align:center}
  .streak-table table{width:100%;border-collapse:collapse;font-size:12.5px}
  .streak-table th{background:rgba(255,255,255,.04);color:var(--sofa-muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:7px 10px;text-align:left;font-weight:600;border-bottom:1px solid var(--sofa-line)}
  .streak-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
  .streak-table tr:last-child td{border-bottom:none}
  .who-tag{display:inline-block;min-width:54px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:3px 6px;border-radius:4px;margin-right:6px}
  .who-tag.home{background:rgba(52,120,246,.18);color:var(--sofa-blue)}
  .who-tag.away{background:rgba(229,68,75,.18);color:var(--sofa-miss)}
  .who-tag.both{background:rgba(46,179,96,.18);color:var(--sofa-accent)}
  .st-streak-cell .lbl{color:var(--sofa-text)}
  .st-streak-cell .val{display:inline-block;margin-left:6px;font-weight:700;color:var(--sofa-accent);font-size:11.5px}
  .st-pred{font-weight:700;color:var(--sofa-blue);font-size:12px}
  .st-pred.muted{color:var(--sofa-muted);font-weight:500}
  .st-noodds{color:var(--sofa-muted);font-style:italic;font-size:11px;cursor:help;border-bottom:1px dotted var(--sofa-muted)}
  .st-odds{text-align:right;color:var(--sofa-pend);font-weight:700;font-size:12px;font-variant-numeric:tabular-nums;width:60px}
  .st-result{text-align:center;font-weight:800;font-size:13px;width:60px}
  .st-result.hit{color:var(--sofa-hit);background:rgba(46,179,96,.10)}
  .st-result.miss{color:var(--sofa-miss);background:rgba(229,68,75,.10)}
  .st-result.na{color:var(--sofa-muted)}
  .summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:18px 20px;border-bottom:1px solid var(--sofa-line);background:linear-gradient(180deg,rgba(46,179,96,.06) 0%,rgba(0,0,0,0) 100%)}
  .sum-card{text-align:center}
  .sum-card .v{font-size:20px;font-weight:800}
  .sum-card .l{font-size:10px;color:var(--sofa-muted);text-transform:uppercase;letter-spacing:.8px}
</style>
</head>

const $leagueSel = document.getElementById('leagueSel');
const $list = document.getElementById('matchesList');
const $card = document.getElementById('cardArea');
const $meta = document.getElementById('meta-info');

// 'All' option followed by individual leagues
const allOpt = document.createElement('option');
allOpt.value = 'ALL';
const totalMatches = DATA.leagues.reduce(function(a,L){return a+(L.matches?L.matches.length:0);},0);
allOpt.textContent = 'All leagues (' + totalMatches + ')';
$leagueSel.appendChild(allOpt);
let _currentLeagueIdx = 0;
DATA.leagues.forEach(function(L,i){
  const o = document.createElement('option'); o.value = i;
  o.textContent = L.name + (L.matches ? ' (' + L.matches.length + ')' : '');
  $leagueSel.appendChild(o);
});
$leagueSel.value = 'ALL';
$meta.textContent = 'Captured: ' + (DATA.captured_at || '') + ' - ' + DATA.leagues.length + ' leagues - times in ' + Intl.DateTimeFormat().resolvedOptions().timeZone;


// Convert match.date + match.time (UTC) to local Date object
function matchLocalDate(m){
  if (!m.date || !m.time || m.time === 'FT' || !/^\d{2}:\d{2}/.test(m.time)) return null;
  const iso = m.date + 'T' + m.time + ':00Z';
  const d = new Date(iso);
  return isNaN(d.getTime()) ? null : d;
}
function matchLocalTimeStr(m){
  const d = matchLocalDate(m);
  if (!d) return m.time || '';
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12:false});
}
function matchLocalDateStr(m){
  const d = matchLocalDate(m);
  if (!d) return m.date || '';
  // YYYY-MM-DD in local zone
  const y = d.getFullYear();
  const mo = String(d.getMonth()+1).padStart(2,'0');
  const da = String(d.getDate()).padStart(2,'0');
  return y+'-'+mo+'-'+da;
}

function fmtDate(d){ if(!d) return ''; const dd = new Date(d + 'T00:00:00'); return dd.toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'}); }
function teamInitial(n){ if(!n) return '?'; return n.split(' ').map(function(x){return x[0]||''}).join('').slice(0,3).toUpperCase(); }

function getCurrentMatches(){
  const sel = $leagueSel.value;
  if (sel === 'ALL'){
    const all = [];
    let _currentLeagueIdx = 0;
DATA.leagues.forEach(function(L,i){
      (L.matches || []).forEach(function(m){
        all.push(Object.assign({_league: L.name, _leagueIdx: i}, m));
      });
    });
    return all;
  }
  const L = DATA.leagues[sel];
  if (!L || !L.matches) return [];
  return L.matches.map(function(m){ return Object.assign({_league: L.name, _leagueIdx: parseInt(sel)}, m); });
}

function refreshLeague(){
  $list.innerHTML = '';
  const matches = getCurrentMatches();
  if (!matches.length){ $dateSel.innerHTML = ''; return; }
  const dates = Array.from(new Set(matches.map(function(m){ return m.date; }))).sort();
  const prev = $dateSel.value;
  $dateSel.innerHTML = dates.map(function(d){ return '<option value="'+d+'">'+fmtDate(d)+' ('+d+')</option>'; }).join('');
  // Keep the previously selected date if still available, else jump to today (or closest future, then closest past)
  if (prev && dates.indexOf(prev) !== -1){
    $dateSel.value = prev;
  } else {
    const today = (DATA.captured_at || new Date().toISOString().slice(0,10));
    let target = dates.find(function(d){ return d === today; });
    if (!target) target = dates.find(function(d){ return d >= today; });
    if (!target) target = dates[dates.length - 1];
    $dateSel.value = target;
  }
  renderMatches();
}

function renderMatches(){
  $list.innerHTML = '';
  const all = getCurrentMatches();
  if (!all.length) return;
  const sel = $dateSel.value;
  let matches = sel ? all.filter(function(m){ return m.date === sel; }) : all;
  // Sort matches by date+time for chronological view across leagues
  matches.sort(function(a,b){
    const da = (a.date||'') + ' ' + (a.time||'');
    const db = (b.date||'') + ' ' + (b.time||'');
    return da.localeCompare(db);
  });
  let lastDate = '';
  matches.forEach(function(m, idx){
    const localDate = matchLocalDateStr(m);
    if (localDate !== lastDate){
      const h = document.createElement('div'); h.className = 'day-header';
      h.textContent = fmtDate(localDate); $list.appendChild(h); lastDate = localDate;
    }
    const isFT = m.status === 'FT';
    let ind = 'upcoming';
    if (isFT){ ind = (m.predictions && m.predictions.winner && m.predictions.winner.result) || 'pending'; }
    const homeScore = (m.home && typeof m.home.goals === 'number') ? m.home.goals : '';
    const awayScore = (m.away && typeof m.away.goals === 'number') ? m.away.goals : '';
    const ko = isFT ? '<div>FT</div>' : '<div>' + matchLocalTimeStr(m) + '</div>';
    const row = document.createElement('div');
    row.className = 'match-row';
    const showLeagueLabel = $leagueSel.value === 'ALL';
    const lgLabel = showLeagueLabel ? '<div class="lg-tag">' + (m._league || '') + '</div>' : '';
    row.innerHTML = '<div class="ko">' + ko + lgLabel + '</div>' +
      '<div class="teams"><div class="t"><span class="name">' + (m.home && m.home.name) + '</span><span class="score' + (isFT?'':' dim') + '">' + homeScore + '</span></div>' +
      '<div class="t"><span class="name">' + (m.away && m.away.name) + '</span><span class="score' + (isFT?'':' dim') + '">' + awayScore + '</span></div></div>' +
      '<div class="indicator ' + ind + '"></div>';
    row.addEventListener('click', function(){
      document.querySelectorAll('.match-row').forEach(function(r){ r.classList.remove('active'); });
      row.classList.add('active');
      _currentLeagueIdx = m._leagueIdx;
      renderCard(m);
    });
    $list.appendChild(row);
  });
}

function predResult(p, key){
  const r = (p[key] || {}).result;
  return (r === 'hit' || r === 'miss' || r === 'pending') ? r : 'pending';
}

function streakPickOf(s){
  const lab = (s.label || '').toLowerCase();
  const overPart = (lab.indexOf('over') !== -1) || (lab.indexOf('more than') !== -1);
  const underPart = (lab.indexOf('under') !== -1) || (lab.indexOf('less than') !== -1);
  const lineMatch = lab.match(/(\d+\.\d)/);
  const line = lineMatch ? lineMatch[1] : null;
  if (lab.indexOf('goals') !== -1){
    if (overPart && line) return 'Over ' + line + ' goals';
    if (underPart && line) return 'Under ' + line + ' goals';
  }
  if (lab.indexOf('cards') !== -1){
    if (overPart && line) return 'Over ' + line + ' cards';
    if (underPart && line) return 'Under ' + line + ' cards';
    if (overPart) return 'Over 4.5 cards';
    if (underPart) return 'Under 4.5 cards';
  }
  if (lab.indexOf('corners') !== -1){
    if (overPart && line) return 'Over ' + line + ' corners';
    if (underPart && line) return 'Under ' + line + ' corners';
  }
  if (lab.indexOf('both teams to score') !== -1 || lab.indexOf('both teams scoring') !== -1) return 'BTTS Yes';
  if (lab.indexOf('no clean sheet') !== -1 || lab.indexOf('without clean sheet') !== -1) return 'BTTS Yes';
  if (lab === 'clean sheet' || lab.indexOf('no goals conceded') !== -1) return 'BTTS No';
  if (lab.indexOf('no goals scored') !== -1) return s.team === 'home' ? 'Home not to score' : (s.team === 'away' ? 'Away not to score' : 'No goal');
  if (lab === 'wins') return s.team === 'away' ? 'Away win' : (s.team === 'home' ? 'Home win' : 'Win');
  if (lab === 'losses') return s.team === 'away' ? 'Away loss' : 'Home loss';
  if (lab === 'no losses') return s.team === 'away' ? 'Away to win or draw' : 'Home to win or draw';
  if (lab === 'no wins') return s.team === 'away' ? 'Away not to win' : 'Home not to win';
  if (lab === 'draws') return 'Draw';
  if (lab === 'no draws') return 'No draw';
  if (lab.indexOf('first to score') !== -1) return s.team === 'away' ? 'Away 1st goal' : (s.team === 'home' ? 'Home 1st goal' : 'First scorer');
  if (lab.indexOf('first to concede') !== -1) return s.team === 'away' ? 'Away concedes 1st' : 'Home concedes 1st';
  if (lab.indexOf('first half winner') !== -1) return s.team === 'away' ? 'Away leads HT' : 'Home leads HT';
  if (lab.indexOf('first half loser') !== -1) return s.team === 'away' ? 'Away trails HT' : 'Home trails HT';
  return '-';
}

  const isFT = m.status === 'FT';
  const cards = (p.ou_cards && typeof p.ou_cards.actual === 'number') ? p.ou_cards.actual : null;

  let oddsBlock = '';
  if (odds && typeof odds.home === 'number' && typeof odds.draw === 'number' && typeof odds.away === 'number'){
    const min = Math.min(odds.home, odds.draw, odds.away);
    oddsBlock = '<div class="section"><h3>Bookmaker odds (1X2)</h3><div class="odds-row">' +
      '<div class="odd-card ' + '' + '"><div class="lbl">Home (1)</div><div class="val">' + odds.home.toFixed(2) + '</div></div>' +

      '<div class="odd-card ' + '' + '"><div class="lbl">Away (2)</div><div class="val">' + odds.away.toFixed(2) + '</div></div>' +
      '</div></div>';
  }

  let sportsbetBlock = '';
  const sb = m.sportsbet_odds || null;
  if (sb && typeof sb.home === 'number' && typeof sb.draw === 'number' && typeof sb.away === 'number'){
    const min = Math.min(sb.home, sb.draw, sb.away);
    sportsbetBlock = '<div class="section"><h3>Odds (1X2)</h3><div class="odds-row">' +
      '<div class="odd-card ' + '' + '"><div class="lbl">Home (1)</div><div class="val">' + sb.home.toFixed(2) + '</div></div>' +
      '<div class="odd-card ' + '' + '"><div class="lbl">Draw (X)</div><div class="val">' + sb.draw.toFixed(2) + '</div></div>' +
      '<div class="odd-card ' + '' + '"><div class="lbl">Away (2)</div><div class="val">' + sb.away.toFixed(2) + '</div></div>' +
      '</div></div>';
  }

  function whoLabelOf(who){
    if (who === 'home') return (m.home.short || m.home.name);
    if (who === 'away') return (m.away.short || m.away.name);
    return 'Both';
  }

  function streakResultFor(s){
    if (!isFT || homeGoals === null || awayGoals === null) return 'na';
    const total = homeGoals + awayGoals;
    const lab = (s.label || '').toLowerCase();
    const who = s.team || 'both';
    const homeWon = homeGoals > awayGoals, awayWon = awayGoals > homeGoals, draw = homeGoals === awayGoals;
    const teamWon = (who === 'home' && homeWon) || (who === 'away' && awayWon);
    const teamLost = (who === 'home' && awayWon) || (who === 'away' && homeWon);
    const teamConceded = (who === 'home' && awayGoals > 0) || (who === 'away' && homeGoals > 0);

    const overWord = lab.indexOf('over') !== -1 || lab.indexOf('more than') !== -1;
    const underWord = lab.indexOf('under') !== -1 || lab.indexOf('less than') !== -1;
    const _gm = lab.match(/(\d+\.\d)/);
    const goalsLine = (lab.indexOf('goals') !== -1 && _gm) ? parseFloat(_gm[1]) : null;
    if (goalsLine !== null && overWord) return total > goalsLine ? 'hit' : 'miss';
    if (goalsLine !== null && underWord) return total < goalsLine ? 'hit' : 'miss';
    if (lab.indexOf('both teams scoring') !== -1) return (homeGoals>0 && awayGoals>0) ? 'hit' : 'miss';
    if (lab.indexOf('without clean sheet') !== -1) return teamConceded ? 'hit' : 'miss';
    if (lab.indexOf('no goals conceded') !== -1) return !teamConceded ? 'hit' : 'miss';
    if (lab.indexOf('no goals scored') !== -1){
      const teamScored = (who==='home' && homeGoals>0) || (who==='away' && awayGoals>0);
      return !teamScored ? 'hit' : 'miss';
    }
    if (lab.indexOf('over 2.5 goals') !== -1) return total > 2.5 ? 'hit' : 'miss';

    if (lab.indexOf('over 1.5 goals') !== -1) return total > 1.5 ? 'hit' : 'miss';
    if (lab.indexOf('under 1.5 goals') !== -1) return total < 1.5 ? 'hit' : 'miss';
    if (lab.indexOf('over 3.5 goals') !== -1) return total > 3.5 ? 'hit' : 'miss';
    if (lab.indexOf('under 3.5 goals') !== -1) return total < 3.5 ? 'hit' : 'miss';
    if (lab.indexOf('both teams to score') !== -1) return (homeGoals>0 && awayGoals>0) ? 'hit' : 'miss';
    if (lab === 'wins') return teamWon ? 'hit' : 'miss';
    if (lab === 'losses') return teamLost ? 'hit' : 'miss';
    if (lab === 'no losses') return !teamLost ? 'hit' : 'miss';
    if (lab === 'no wins') return !teamWon ? 'hit' : 'miss';
    if (lab === 'draws') return draw ? 'hit' : 'miss';
    if (lab === 'no draws') return !draw ? 'hit' : 'miss';
    if (lab.indexOf('clean sheet') !== -1 && lab.indexOf('no') === -1) return !teamConceded ? 'hit' : 'miss';

    if (cards !== null) {
      if (lab.indexOf('more than 4.5 cards') !== -1) return cards > 4.5 ? 'hit' : 'miss';
      if (lab.indexOf('less than 4.5 cards') !== -1) return cards < 4.5 ? 'hit' : 'miss';
    }
    const corners = (typeof A.corners_total === 'number') ? A.corners_total : null;

      if (lab.indexOf('less than 8.5 corners') !== -1) return corners < 8.5 ? 'hit' : 'miss';
    }
    if (typeof A.first_to_score !== 'undefined') {

      if (lab.indexOf('first to concede') !== -1) {
        if (A.first_to_score === null) return 'miss';
        const conceder = A.first_to_score === 'home' ? 'away' : 'home';
        return conceder === who ? 'hit' : 'miss';
      }
    }
    if (typeof A.ht_winner !== 'undefined') {
      if (lab.indexOf('first half winner') !== -1) return A.ht_winner === who ? 'hit' : 'miss';
      if (lab.indexOf('first half loser') !== -1) {
        const loser = A.ht_winner === 'home' ? 'away' : (A.ht_winner === 'away' ? 'home' : null);

    if (typeof A.corners_total === 'number') items.push({l:'Corners (total)', v: A.corners_total, split: A.home_corners + ' - ' + A.away_corners});
    if (typeof A.fouls_total === 'number') items.push({l:'Fouls (total)', v: A.fouls_total, split: A.home_fouls + ' - ' + A.away_fouls});
    if (typeof A.ht_winner !== 'undefined') items.push({l:'Half-time', v: A.ht_home + ' - ' + A.ht_away});
    if (A.first_scorer) items.push({l:'1st goal', v: A.first_scorer});
    if (typeof A.home_sot === 'number') items.push({l:'Shots on target', v: A.home_sot + ' - ' + A.away_sot});
    statsBlock = '<div class="section"><h3>Match stats</h3><div class="stat-grid">' +
      items.map(function(it){ return '<div class="stat-cell"><div class="lbl">' + it.l + '</div><div><span class="val">' + it.v + '</span>' + (it.split ? ' <span class="split">(' + it.split + ')</span>' : '') + '</div></div>'; }).join('') +
      '</div></div>';
  }

  const hasStreaks = (m.h2h_streaks && m.h2h_streaks.length) || (m.team_streaks && m.team_streaks.length);
  let streaksBlock = '';
  if (hasStreaks){
    streaksBlock = '<div class="section"><h3>Streaks - data, prediction, result</h3><div class="streak-tables">' +
      streakTable('Head-to-head streaks', m.h2h_streaks || []) +
      streakTable('Team streaks (Full-time)', m.team_streaks || []) +
      '</div></div>';
  }

  function predRow(label, key, valueStr){
    const r = predResult(p, key);
    const mark = r === 'pending' ? '-' : (r === 'hit' ? 'HIT' : 'MISS');
    const odd = (p[key] && typeof p[key].odds === 'number') ? p[key].odds.toFixed(2) : null;
    const oddChip = odd ? '<span class="pred-odds">@ ' + odd + '</span>' : '';
    return '<div class="pred"><div><div class="lbl">' + label + '</div><div class="pick">' + valueStr + ' ' + oddChip + '</div></div><div class="res ' + r + '">' + mark + '</div></div>';
  }
  const winnerStr = (p.winner && p.winner.pick) || '-';
  const goalsStr = p.ou_goals ? (p.ou_goals.pick + ' ' + p.ou_goals.line) : '-';
  const bttsStr  = p.btts ? p.btts.pick : '-';
  const cardsStr = p.ou_cards ? (p.ou_cards.pick + ' ' + p.ou_cards.line) : '-';
  const predBlock = '<div class="section"><h3>Predictions vs Outcome (model)</h3><div class="preds">' +
    predRow('Winner', 'winner', winnerStr) +
    predRow('Goals', 'ou_goals', goalsStr) +
    predRow('BTTS', 'btts', bttsStr) +
    predRow('Cards', 'ou_cards', cardsStr) +
  '</div></div>';

  let summaryBar = '';
  if (isFT){
    let hit = 0, miss = 0;
    ['winner','btts','ou_goals','ou_cards'].forEach(function(k){
      const r = (p[k] || {}).result;
      if (r === 'hit') hit++; else if (r === 'miss') miss++;
    });
    const allStreaks = (m.h2h_streaks || []).concat(m.team_streaks || []);
    let sHit = 0, sMiss = 0;
    allStreaks.forEach(function(s){ const r = streakResultFor(s); if (r === 'hit') sHit++; else if (r === 'miss') sMiss++; });
    const totalG = (homeGoals !== null && awayGoals !== null) ? (homeGoals + awayGoals) : '-';
    summaryBar = '<div class="summary-bar">' +
      '<div class="sum-card"><div class="v" style="color:var(--sofa-hit)">' + hit + '</div><div class="l">Model Hits</div></div>' +
      '<div class="sum-card"><div class="v" style="color:var(--sofa-miss)">' + miss + '</div><div class="l">Model Miss</div></div>' +
      '<div class="sum-card"><div class="v">' + sHit + '/' + (sHit+sMiss) + '</div><div class="l">Streaks Hit</div></div>' +
      '<div class="sum-card"><div class="v">' + totalG + '</div><div class="l">Total Goals</div></div>' +
    '</div>';
  }

  const predType = (p.winner && p.winner.type) || null;
  const predPick = (p.winner && p.winner.pick) || null;
  const predResultStatus = (p.winner && p.winner.result) || 'pending';
  let actualType = null;
  if (isFT && homeGoals !== null && awayGoals !== null){
    if (homeGoals > awayGoals) actualType = 'home';
    else if (awayGoals > homeGoals) actualType = 'away';
    else actualType = 'draw';
  }
  const homeClass = isFT ? (actualType === 'home' ? ' winner' : (actualType === 'draw' ? ' draw' : ' loser')) : '';
  const awayClass = isFT ? (actualType === 'away' ? ' winner' : (actualType === 'draw' ? ' draw' : ' loser')) : '';
  let predLine = '';
  if (predPick){
    const pclass = isFT ? (predResultStatus === 'hit' ? 'hit' : (predResultStatus === 'miss' ? 'miss' : '')) : '';
    predLine = '<div class="pred-line"><span class="lbl">Predicted winner</span><span class="pick ' + pclass + '">' + predPick + '</span></div>';
  }
  let actualLine = '';
  if (isFT){
    let actualText = 'Draw'; let aClass = 'draw';
    if (actualType === 'home'){ actualText = m.home.name + ' won'; aClass = ''; }
    else if (actualType === 'away'){ actualText = m.away.name + ' won'; aClass = ''; }
    actualLine = '<div class="actual-line"><span class="lbl">Resulted</span><span class="actual ' + aClass + '">' + actualText + '</span></div>';
  }

  const heroScore = isFT
    ? '<div class="scoreline">' + homeGoals + ' - ' + awayGoals + '</div><div class="status ft">Full Time</div>' + predLine + actualLine
    : '<div class="scoreline upcoming">vs</div><div class="status upcoming">Upcoming</div>' + predLine;

  const lg = (typeof m._leagueIdx === 'number') ? DATA.leagues[m._leagueIdx] : (DATA.leagues[$leagueSel.value] || DATA.leagues[_currentLeagueIdx]);
  const homeMeta = (m.home.rank ? '#' + m.home.rank : '') + ' ' + (m.home.pts ? '- ' + m.home.pts + ' pts' : '');
  const awayMeta = (m.away.rank ? '#' + m.away.rank : '') + ' ' + (m.away.pts ? '- ' + m.away.pts + ' pts' : '');

  $card.innerHTML =
    '<div class="card-hero">' +
      '<div class="crumbs">' + lg.name + ' - ' + (lg.season || '') + ' - ' + fmtDate(matchLocalDateStr(m)) + ' - ' + matchLocalTimeStr(m) + (m.venue ? ' - ' + m.venue : '') + '</div>' +
      '<div class="row">' +
        '<div class="team-block' + homeClass + '"><div class="badge">' + teamInitial(m.home.name) + '</div><div class="name">' + m.home.name + '</div><div class="meta">' + homeMeta + '</div></div>' +
        '<div class="score-block"><div class="ko">' + (isFT ? 'Score' : matchLocalTimeStr(m)) + '</div>' + heroScore + '</div>' +
        '<div class="team-block away' + awayClass + '"><div class="badge">' + teamInitial(m.away.name) + '</div><div class="name">' + m.away.name + '</div><div class="meta">' + awayMeta + '</div></div>' +
      '</div>' +
    '</div>' +
    summaryBar + sportsbetBlock + predBlock + statsBlock + streaksBlock;
}

$leagueSel.addEventListener('change', refreshLeague);
const $dateSel = document.getElementById('dateSel');
const $datePrev = document.getElementById('datePrev');
const $dateNext = document.getElementById('dateNext');
$dateSel.addEventListener('change', renderMatches);
function navDate(delta){
  const opts = Array.from($dateSel.options);
  let i = opts.findIndex(function(o){return o.value === $dateSel.value;});
  if (i < 0) i = 0;
  i = Math.max(0, Math.min(opts.length - 1, i + delta));
  $dateSel.value = opts[i].value;
  renderMatches();
}
$datePrev.addEventListener('click', function(){ navDate(-1); });
$dateNext.addEventListener('click', function(){ navDate(1); });
const $dateToday = document.getElementById('dateToday');
$dateToday.addEventListener('click', function(){
  const today = (DATA.captured_at || new Date().toISOString().slice(0,10));
  const opts = Array.from($dateSel.options);
  let target = opts.find(function(o){ return o.value === today; });
  if (!target) target = opts.find(function(o){ return o.value >= today; });
  if (!target && opts.length) target = opts[opts.length - 1];
  if (target){ $dateSel.value = target.value; renderMatches(); }
});


refreshLeague();
const first = $list.querySelector('.match-row');
if (first) first.click();
</script>
</body>
</html>
