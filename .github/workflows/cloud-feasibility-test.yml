name: Cloud feasibility test (provider reachability)

# Temporary, read-only probe: runs the ESPN fixtures + Sportsbet odds
# collectors on a GitHub-hosted (datacenter IP) runner to check whether
# the providers block it. Does NOT touch Firestore and does NOT commit.
# Remove after the question is answered.

on:
  workflow_dispatch: {}

jobs:
  probe:
    name: Probe ESPN + Sportsbet from a GitHub-hosted runner
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: python -m pip install --quiet --upgrade pip curl_cffi tzdata

      - name: Run fixtures + odds collectors (no upload, no commit)
        run: python scripts/soccer_phases_routine.py --phases fixtures

      - name: Show fixture/odds source health
        if: always()
        run: |
          echo "===== Phase 1 fixture slate (ESPN) source health ====="
          sed -n '1,60p' docs/agent-system/outputs/phase1_fixture_slate_current.md || echo "(no phase1 slate written)"
          echo ""
          echo "===== Phase 2 odds slate (Sportsbet) ====="
          if [ -f docs/agent-system/outputs/phase2_odds_slate_current.csv ]; then
            total=$(($(wc -l < docs/agent-system/outputs/phase2_odds_slate_current.csv) - 1))
            priced=$(grep -c 'ready_for_phase_3' docs/agent-system/outputs/phase2_odds_slate_current.csv || true)
            echo "phase2 rows: $total | rows marked ready_for_phase_3 (priced): $priced"
            head -5 docs/agent-system/outputs/phase2_odds_slate_current.csv
          else
            echo "(no phase2 odds slate written — Sportsbet fetch likely failed/blocked)"
          fi
